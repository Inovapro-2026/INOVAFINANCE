
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INOVAFINANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <style>
      :root {
        --primary: #7A5AF5;
        --secondary: #4A90E2;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #f8fafc;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow-x: hidden;
      }
      
      /* Background Particles Animation */
      .bg-particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 20% 30%, rgba(122, 90, 245, 0.15) 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(74, 144, 226, 0.15) 0%, transparent 40%),
                    radial-gradient(circle at 50% 50%, rgba(184, 227, 194, 0.1) 0%, transparent 50%);
        filter: blur(80px);
        animation: drift 25s ease-in-out infinite alternate;
      }

      @keyframes drift {
        from { transform: scale(1) translate(0, 0); }
        to { transform: scale(1.3) translate(5%, 5%); }
      }

      /* Tech Card Effects */
      .tech-card {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
      }
      .tech-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      }
      
      .tech-card::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          to bottom right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0) 40%,
          rgba(255, 255, 255, 0.4) 50%,
          rgba(255, 255, 255, 0) 60%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: rotate(45deg);
        transition: all 0.6s;
        opacity: 0;
      }
      .tech-card:hover::after {
        left: 100%;
        top: 100%;
        opacity: 1;
      }

      /* Mic Waves Animation */
      .mic-waves {
        position: absolute;
        width: 200px;
        height: 200px;
        background: rgba(122, 90, 245, 0.2);
        border-radius: 50%;
        animation: pulse-waves 2s infinite;
        z-index: -1;
      }
      .mic-waves:nth-child(2) { animation-delay: 0.5s; }
      .mic-waves:nth-child(3) { animation-delay: 1s; }

      @keyframes pulse-waves {
        0% { transform: scale(0.5); opacity: 1; }
        100% { transform: scale(2.5); opacity: 0; }
      }

      .perspective-1000 { perspective: 1000px; }
      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
      }
      .card-flip { transform: rotateY(180deg); }
      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 1.5rem;
      }
      .card-back { transform: rotateY(180deg); }

      .press-bounce:active { transform: scale(0.95); }

      .animate-fadeIn { animation: fadeIn 0.6s ease-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .glass-modal {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

  }
}
</script>
</head>
<body>
    <div class="bg-particles"></div>
    <div id="root"></div>
</body>
</html>
