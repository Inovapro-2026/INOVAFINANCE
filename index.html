
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7A5CFA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>INOVAFINANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <style>
      :root {
        --primary: #7A5AF5;
        --secondary: #4A90E2;
        --bg-dark: #0a0f1d;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--bg-dark);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow-x: hidden;
        color: white;
      }
      
      /* Background Particles Animation */
      .bg-particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: 
          radial-gradient(circle at 10% 10%, rgba(122, 90, 245, 0.12) 0%, transparent 45%),
          radial-gradient(circle at 90% 90%, rgba(74, 144, 226, 0.12) 0%, transparent 45%),
          radial-gradient(circle at 50% 50%, rgba(122, 90, 245, 0.08) 0%, transparent 60%);
        filter: blur(60px);
        animation: drift 20s linear infinite alternate;
      }

      @keyframes drift {
        0% { transform: scale(1) translate(0, 0); }
        100% { transform: scale(1.1) translate(2%, 2%); }
      }

      /* Premium Tech Card System */
      .tech-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        overflow: hidden;
        border-radius: 32px;
      }
      
      .tech-card:hover {
        transform: translateY(-8px) scale(1.01);
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(122, 90, 245, 0.3);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .tech-card::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          to bottom right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.05) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: rotate(45deg);
        transition: all 0.8s;
        opacity: 0;
      }
      .tech-card:hover::after {
        left: 100%;
        top: 100%;
        opacity: 1;
      }

      .glow-purple { box-shadow: inset 0 0 20px rgba(122, 90, 245, 0.05); }
      .glow-blue { box-shadow: inset 0 0 20px rgba(74, 144, 226, 0.05); }

      .reveal-card {
        opacity: 0;
        transform: translateY(20px);
        animation: reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      @keyframes reveal {
        to { opacity: 1; transform: translateY(0); }
      }

      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }

      .perspective-1000 { perspective: 1000px; }
      .card-inner {
        transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
      }
      .card-flip { transform: rotateY(180deg); }
      .card-face {
        backface-visibility: hidden;
      }
      .card-back { transform: rotateY(180deg); }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(122, 90, 245, 0.2); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(122, 90, 245, 0.4); }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",

  }
}
</script>
</head>
<body>
    <div class="bg-particles"></div>
    <div id="root"></div>
</body>
</html>
