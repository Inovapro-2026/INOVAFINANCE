
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INOVAFINANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <style>
      /* ===== THEME SYSTEM ===== */
      :root, [data-theme="dark"] {
        --primary: #7A5AF5;
        --secondary: #4A90E2;
        --bg-main: #0a0f1d;
        --bg-card: rgba(255, 255, 255, 0.03);
        --bg-card-hover: rgba(255, 255, 255, 0.06);
        --bg-input: rgba(255, 255, 255, 0.05);
        --bg-modal: rgba(10, 15, 29, 0.85);
        --text-primary: #ffffff;
        --text-secondary: #a0aec0;
        --text-muted: #64748b;
        --border-color: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(122, 90, 245, 0.3);
        --shadow-color: rgba(0, 0, 0, 0.5);
        --particles-purple: rgba(122, 90, 245, 0.15);
        --particles-blue: rgba(74, 144, 226, 0.15);
        --card-surface: rgba(255, 255, 255, 0.03);
        --success: #22c55e;
        --danger: #ef4444;
      }

      [data-theme="light"] {
        --primary: #7A5AF5;
        --secondary: #4A90E2;
        --bg-main: #f1f5f9;
        --bg-card: rgba(255, 255, 255, 0.9);
        --bg-card-hover: rgba(255, 255, 255, 1);
        --bg-input: #f8fafc;
        --bg-modal: rgba(255, 255, 255, 0.95);
        --text-primary: #1e293b;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: rgba(0, 0, 0, 0.08);
        --border-hover: rgba(122, 90, 245, 0.4);
        --shadow-color: rgba(0, 0, 0, 0.1);
        --particles-purple: rgba(122, 90, 245, 0.08);
        --particles-blue: rgba(74, 144, 226, 0.08);
        --card-surface: rgba(255, 255, 255, 0.95);
        --success: #16a34a;
        --danger: #dc2626;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--bg-main);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow-x: hidden;
        color: var(--text-primary);
        transition: background 0.3s ease, color 0.3s ease;
      }
      
      /* Background Particles Animation - Purple & Blue Flow */
      .bg-particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: 
          radial-gradient(circle at 10% 10%, var(--particles-purple) 0%, transparent 45%),
          radial-gradient(circle at 90% 90%, var(--particles-blue) 0%, transparent 45%),
          radial-gradient(circle at 50% 50%, var(--particles-purple) 0%, transparent 60%);
        filter: blur(60px);
        animation: drift 20s linear infinite alternate;
        transition: background 0.3s ease;
      }

      @keyframes drift {
        0% { transform: scale(1) translate(0, 0); }
        50% { transform: scale(1.2) translate(2%, 3%); }
        100% { transform: scale(1.1) translate(-2%, -2%); }
      }

      /* Premium Tech Card System */
      .tech-card {
        background: var(--bg-card);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        overflow: hidden;
        border-radius: 32px;
      }
      
      .tech-card:hover {
        transform: translateY(-10px) scale(1.02);
        background: var(--bg-card-hover);
        border-color: var(--border-hover);
        box-shadow: 0 30px 60px -12px var(--shadow-color), 
                    0 18px 36px -18px rgba(122, 90, 245, 0.3);
      }

      .tech-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
        pointer-events: none;
      }

      /* Glow Effects */
      .glow-purple { box-shadow: inset 0 0 20px rgba(122, 90, 245, 0.1); }
      .glow-blue { box-shadow: inset 0 0 20px rgba(74, 144, 226, 0.1); }

      /* Animation for entry */
      .reveal-card {
        opacity: 0;
        transform: translateY(30px);
        animation: reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      @keyframes reveal {
        to { opacity: 1; transform: translateY(0); }
      }

      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }
      .stagger-5 { animation-delay: 0.5s; }

      /* Mic Waves Animation */
      .mic-waves {
        position: absolute;
        width: 200px;
        height: 200px;
        background: rgba(122, 90, 245, 0.2);
        border-radius: 50%;
        animation: pulse-waves 2s infinite;
        z-index: -1;
      }

      @keyframes pulse-waves {
        0% { transform: scale(0.5); opacity: 1; }
        100% { transform: scale(2.5); opacity: 0; }
      }

      .glass-modal {
        background: var(--bg-modal);
        backdrop-filter: blur(30px);
        border: 1px solid var(--border-color);
      }

      /* Theme Toggle Animation */
      .theme-toggle {
        transition: transform 0.3s ease;
      }
      .theme-toggle:hover {
        transform: rotate(15deg);
      }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",

  }
}
</script>
</head>
<body>
    <div class="bg-particles"></div>
    <div id="root"></div>
</body>
</html>
